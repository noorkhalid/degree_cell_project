{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Banks</h3>
  <a class="btn btn-dark" href="{% url 'academics:bank_create' %}">
    <i class="bi bi-plus-lg me-1"></i> Add
  </a>
</div>

<table class="table table-bordered bg-white align-middle">
  <thead>
    <tr>
      <th>Name</th>
      <th>Active</th>
      <th class="text-end">Action</th>
    </tr>
  </thead>
  <tbody>
    {% for item in items %}
      <tr>
        <td>{{ item.name }}</td>
        <td>{% if item.is_active %}True{% else %}False{% endif %}</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-primary rounded-pill" href="{% url 'academics:bank_edit' item.pk %}">Edit</a>
          <a class="btn btn-sm btn-outline-danger rounded-pill" href="{% url 'academics:bank_delete' item.pk %}">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="3" class="text-center text-muted py-4">No banks found.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
