{% extends 'base.html' %}
{% block content %}
<h3>Verify Application - {{ app.tracking_no }}</h3>
<div class="alert alert-info">Declared date at entry: <b>{{ app.declared_result_date }}</b>. If you change it, fee will be recalculated and verification may be blocked.</div>
<form method="post" class="card card-body">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Verify</button></form>
{% endblock %}
