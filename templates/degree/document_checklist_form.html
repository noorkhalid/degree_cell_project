{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="page-title">Update Required Documents</h1>
    <p class="page-subtitle mb-0">{{ app.tracking_no }} - {{ app.student_name }}</p>
  </div>
</div>
<form method="post">{% csrf_token %}
  <div class="card checklist-card">
    <div class="card-header">Document Checklist</div>
    <div class="card-body p-3 p-lg-4">
      <div class="row g-3">
        {% for field in form %}
        <div class="col-md-6 col-xl-4 check-item">
          <label>{{ field }} <span>{{ field.label }}</span></label>
          <div class="text-danger small mt-1">{{ field.errors }}</div>
        </div>
        {% endfor %}
      </div>
      <div class="d-flex justify-content-end gap-2 border-top mt-4 pt-4">
        <a class="btn btn-outline-secondary" href="{% url 'degree:detail' app.pk %}">Cancel</a>
        <button class="btn btn-dark">Save Documents</button>
      </div>
    </div>
  </div>
</form>
{% endblock %}
