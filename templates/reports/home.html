{% extends 'base.html' %}
{% block content %}
<h3>Reports</h3>
<div class="row"><div class="col-md-6"><div class="card"><div class="card-body"><h5>By Status</h5><table class="table table-sm">{% for row in by_status %}<tr><td>{{ row.status }}</td><td>{{ row.total }}</td></tr>{% endfor %}</table></div></div></div><div class="col-md-6"><div class="card"><div class="card-body"><h5>By Type</h5><table class="table table-sm">{% for row in by_type %}<tr><td>{{ row.application_type }}</td><td>{{ row.total }}</td></tr>{% endfor %}</table></div></div></div></div>
<a class="btn btn-success mt-3" href="{% url 'degree:export' %}">Export Applications Excel</a>
{% endblock %}
